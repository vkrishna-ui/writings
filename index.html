{{ partial "header.html" . }}
<main class="container">
    {{ .Content }}
    
    <section class="posts">
        <h2>Mathematical Articles</h2>
        <ul>
            {{ range (where .Site.RegularPages "Section" "posts") }}
            <li>
                <a href="{{ .Permalink }}">{{ .Title }}</a> — {{ .Date.Format "Jan 2, 2006" }}
            </li>
            {{ end }}
        </ul>
    </section>
</main>
{{ partial "footer.html" . }}
